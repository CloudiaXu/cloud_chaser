<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark disc so the cyan bird stays legible against any browser tab
       theme (light or dark). Radius 15.5 leaves a 0.5px transparent edge
       so the icon doesn't bleed into the tab's rounded corner. -->
  <circle cx="16" cy="16" r="15.5" fill="#05070d"/>

  <!-- Bird silhouette traced through the same 5 anatomy nodes that
       Hero's `addHotSpots` declares as the particle bird's skeletal
       hotspots (tail → head → body → wing apex → wing tip), keeping
       the favicon visually sourced from the same data as the live
       Hero animation. -->
  <g stroke="#4ea0ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" fill="none">
    <polyline points="4,19 9,17 13,19 20,12 28,16"/>
  </g>

  <!-- Anchor stars at each anatomy node (halo + core). Wing apex
       (20,12) is the focal — slightly larger because Hero's hotspots
       give it the highest boost (0.80) — it's the eye-magnet of the
       silhouette. -->
  <g fill="#bcdcff">
    <g opacity="0.32">
      <circle cx="4" cy="19" r="2.2"/>
      <circle cx="9" cy="17" r="2.2"/>
      <circle cx="13" cy="19" r="2.2"/>
      <circle cx="20" cy="12" r="2.8"/>
      <circle cx="28" cy="16" r="2.2"/>
    </g>
    <circle cx="4" cy="19" r="1.2"/>
    <circle cx="9" cy="17" r="1.2"/>
    <circle cx="13" cy="19" r="1.2"/>
    <circle cx="20" cy="12" r="1.55"/>
    <circle cx="28" cy="16" r="1.2"/>
  </g>
</svg>
