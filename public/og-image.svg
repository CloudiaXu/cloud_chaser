<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    OG / Twitter share card — 1200×630.
    Layout mirrors the site's hero: dotted-typography headline (left)
    + particle bird (right). Both are sourced from real project assets
    so the share preview is a true thumbnail of the site, not a remix.

      headline:  public/text.svg     (existing brand asset, 1216×654)
      bird:      public/bird.svg     (generated by scripts/build_bird_svg.mjs;
                                      runs the same sampling algorithm as
                                      src/geometry/birdFromImage.ts, the
                                      live hero's particle source)
      footer:    URL + tagline in system sans

    Rebuild (regenerates bird.svg first, then rasterises this file):
      npm run og
  -->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!--
    Headline — text.svg scaled to roughly 58% width, left-aligned so
    the dotted letters dominate the left column. The full asset still
    renders (we don't crop its viewBox) so glyph rhythm is intact.
  -->
  <image xlink:href="text.svg" href="text.svg"
         x="-10" y="100" width="730" height="392"
         preserveAspectRatio="xMidYMid meet"/>

  <!--
    Bird — bird.svg is generated from public/reference.png by the same
    sampling code the live hero uses (see scripts/build_bird_svg.mjs).
    No PNG round-trip; the og-image bird is pure SVG dots, matching the
    dotted-typography technique of text.svg above. Transparent by
    construction so no luminance-mask hack is needed.
  -->
  <!-- Bird now uses the full 490×465 crop (aspect ≈ 1.054, nearly
       square). Sized to fill the right column without colliding with
       text on the left or the footer below. -->
  <image xlink:href="bird.svg" href="bird.svg"
         x="710" y="60" width="470" height="446"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Footer rule -->
  <line x1="60" y1="558" x2="1140" y2="558"
        stroke="#4ea0ff" stroke-opacity="0.22" stroke-width="1"/>

  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17">
    <text x="60" y="598" fill="#8a96b0" letter-spacing="1.5">cloudiaxu.github.io/cloud_chaser</text>
    <text x="1140" y="598" fill="#4ea0ff" text-anchor="end"
          font-style="italic" font-weight="500">XiaoYun Xu — Connect the dots.</text>
  </g>
</svg>
